name: Build & Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/digitaonenetwork/fablix-slicer:latest
            ghcr.io/digitaonenetwork/fablix-slicer:sha-${{ github.sha }}
          build-args: |
            SLICER_BUILD_COMMIT=${{ github.sha }}
            SLICER_BUILD_DATE=${{ github.event.head_commit.timestamp }}
